name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "prisma+postgres://localhost:51213/?api_key=ci-placeholder"
      DIRECT_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "ci-jwt-secret"
      AUTOMATION_SECRET: "ci-automation-secret"
      PARTNER_API_KEY: "ci-partner-api-key"
      SMOKE_BASE_URL: "http://127.0.0.1:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start &

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000/login

      - name: Smoke tests
        run: npm run test:smoke
